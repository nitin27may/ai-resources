site_name: AI Knowledge Hub
site_url: http://localhost:8000/
site_description: Your go-to resource for AI knowledge -- from basics to architecture patterns
repo_url: https://github.com/nitin27may/ai-resources
repo_name: AI Knowledge Hub
edit_uri: "?path=/docs/"

# Theme configuration
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.tooltips
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    logo: material/book-open-page-variant
  font:
    text: Manrope
    code: Roboto Mono
  custom_dir: overrides

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
      preserve_tabs: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - toc:
      permalink: true
  - attr_list
  - abbr
  - def_list
  - md_in_html
  - pymdownx.details
  - footnotes
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Extra CSS and JavaScript
extra_css:
  - assets/stylesheets/theme.css
  - assets/stylesheets/fullwidth-toggle.css
  - assets/stylesheets/footer-custom.css
  - assets/stylesheets/tooltip-custom.css

extra_javascript:
  - assets/javascripts/fullwidth-toggle.js

# Plugins configuration
plugins:
  - search
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom

nav:
  - Home: index.md
  - Getting Started:
      - AI 101: getting-started/index.md
      - Learning Paths: getting-started/learning-paths.md
  - Concepts:
